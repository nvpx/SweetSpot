<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cargando...</title>

<style>

body{
  margin:0;
  height:100vh;
  overflow:hidden;
  font-family:sans-serif;
  background:#f5f5f5;
}

/* FONDO */

.fondo{
  position:absolute;
  width:100%;
  height:100%;

  background:url("img/Fondopostres2.JPG")
  no-repeat center center;

  background-size:cover;
  opacity:.25;
}

/* OVERLAY */

.overlay{
  position:absolute;
  width:100%;
  height:100%;

  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;

  background:rgba(255,255,255,.30);
}

/* LOGO */

.logo{
  width:min(400px,55vw);
  height:auto;
  max-height:50vh;
  object-fit:contain;

  animation:zoom 1.2s ease-in-out;
}
/* ANIMACIÓN */

@keyframes zoom{

  0%{
    transform:scale(.6);
    opacity:0;
  }

  100%{
    transform:scale(1);
    opacity:1;
  }

}

/* TEXTO */

.texto{
  margin-top:20px;
  font-size:22px;
  font-weight:bold;
}

.texto-gradiente{
  background:linear-gradient(
    90deg,
    #ff6b81,
    #ff9f43
  );

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* CELULAR */

@media(max-width:768px){

  .texto{
    font-size:18px;
    text-align:center;
    padding:0 15px;
  }

}

</style>
</head>

<body>

<div class="fondo"></div>

<div class="overlay">

  <img
  src="img/logopostres.PNG"
  alt="Logo"
  class="logo">

  <div class="texto texto-gradiente">
    HECHOS PARA COMPARTIR (O NO)
  </div>

</div>

<script>

setTimeout(() => {

  window.location.href =
  "tienda.html";

}, 2000);

</script>

</body>
</html>
